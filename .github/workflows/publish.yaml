name: Publish

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Step 1: Publish'
        required: false
        default: true
        type: boolean
      package:
        description: 'Step 2: Package'
        required: false
        default: true
        type: boolean
      release:
        description: 'Step 3: Release'
        required: false
        default: true
        type: boolean
      source_branch:
        description: 'Source branch (branch to build from, "auto" uses workflow ref)'
        required: false
        default: 'auto'
        type: string
      version:
        description: 'Version (leave empty or "auto" to compute from last tag)'
        required: false
        default: 'auto'
        type: string
      bump_type:
        description: 'Bump Type (ignored when version is explicit)'
        required: false
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
      base_ver:
        description: 'Major version stream (tags outside this major are ignored)'
        required: false
        default: '0'
        type: string
      preview:
        description: 'Preview release (auto = follows branch: non-master → true, master → false)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_branch == 'auto' && github.ref || inputs.source_branch }}
          fetch-depth: 0

      - name: Fetch publish.sh
        if: ${{ inputs.source_branch != 'auto' }}
        run: git restore --source origin/${{ github.ref_name }} -- publish.sh
        shell: bash

      - name: Compute Version
        id: ver
        shell: bash
        run: |
          chmod +x ./publish.sh
          SOURCE_BRANCH="${{ inputs.source_branch == 'auto' && github.ref_name || inputs.source_branch }}"
          VERSION=$(GITHUB_REF_NAME="$SOURCE_BRANCH" ./publish.sh version -v "${{ inputs.version }}" -b "${{ inputs.bump_type }}" -M "${{ inputs.base_ver }}" -p "${{ inputs.preview }}")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install zip (Windows)
        if: runner.os == 'Windows'
        run: choco install zip -y
        shell: bash

      - name: Publish
        if: ${{ inputs.publish }}
        run: |
          ./publish.sh publish -v "${{ env.VERSION }}" -a "${{ matrix.rid }}" -u true
          find publish
        shell: bash

      - name: Package
        if: ${{ inputs.package }}
        run: |
          ./publish.sh package -v "${{ env.VERSION }}" -a "${{ matrix.rid }}" -u true
          find release
        shell: bash

      - name: Upload Artifacts
        if: ${{ inputs.package }}
        uses: actions/upload-artifact@v7
        with:
          name: comets_${{ env.VERSION }}_${{ matrix.rid }}
          path: release/comets_${{ env.VERSION }}_${{ matrix.rid }}.zip

  release:
    needs: build
    if: ${{ inputs.release }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_branch == 'auto' && github.ref || inputs.source_branch }}
          fetch-depth: 0

      - name: Fetch publish.sh
        if: ${{ inputs.source_branch != 'auto' }}
        run: git restore --source origin/${{ github.ref_name }} -- publish.sh
        shell: bash

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Git Tag
        run: |
          git config user.name "jurakovic"
          git config user.email "17744091+jurakovic@users.noreply.github.com"
          chmod +x ./publish.sh
          ./publish.sh release -v "${{ needs.build.outputs.version }}" -u true
        shell: bash

      - name: Prepare Release
        run: |
          find artifacts
          mkdir release
          find artifacts -name "*.zip" -exec cp {} release/ \;
          cd release && find . -name "*.zip" -exec sha256sum {} \; | sed 's;./;;' > checksums.txt && cd - > /dev/null
          find release
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ needs.build.outputs.version }}"
          prerelease: ${{ contains(needs.build.outputs.version, 'preview') }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
